services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./app:/app/app
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
    restart: unless-stopped

  frontend:
    build: frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
